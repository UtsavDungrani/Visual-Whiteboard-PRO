<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Console - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">A</div>
      <h1>System Console</h1>
      <p>Administrator Login</p>
    </div>

    <div id="alert-box" class="alert error" style="display: none;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Administrative Email</label>
        <input type="email" id="email" required placeholder="admin@whiteboard.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-block">Sign In</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = 'index.html';
    }

    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('alert-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Authenticating...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Verify role before logging in
        if (data.user && data.user.role === 'admin') {
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_name', data.user.name);
          localStorage.setItem('admin_email', data.user.email);
          window.location.href = 'index.html';
        } else {
          throw new Error('Access Denied: Administrator privileges required.');
        }
      } catch (err) {
        alertBox.textContent = err.message;
        alertBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
